apiVersion: v1
kind: Service
metadata:
  name: langgraph-workflow-engine
  labels:
    app: langgraph-workflow-engine
spec:
  selector:
    app: langgraph-workflow-engine
  ports:
  - port: 8000
    targetPort: 8000
    name: http
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: langgraph-workflow-dashboard
  labels:
    app: langgraph-workflow-dashboard
spec:
  selector:
    app: langgraph-workflow-dashboard
  ports:
  - port: 80
    targetPort: 80
    name: http
  type: LoadBalancer
