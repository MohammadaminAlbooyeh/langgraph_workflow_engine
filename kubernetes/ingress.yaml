apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: langgraph-workflow-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: workflow-engine.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: langgraph-workflow-dashboard
            port:
              number: 80
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: langgraph-workflow-engine
            port:
              number: 8000
